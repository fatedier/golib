version: "2"
run:
  concurrency: 4
  timeout: 20m
  build-tags:
  - integ
  - integfuzz
linters:
  default: none
  enable:
  - asciicheck
  - copyloopvar
  - errcheck
  - unused
  - gocritic
  - revive
  - govet
  - ineffassign
  - lll
  - misspell
  - staticcheck
  - unconvert
  - unparam
  - gosec
  - prealloc
  - predeclared
  - makezero
  - modernize
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    gocritic:
      disabled-checks:
      - exitAfterDefer
    gosec:
      excludes: ["G115", "G117", "G402", "G505"]
      severity: low
      confidence: low
    govet:
      disable:
      - shadow
    lll:
      line-length: 160
      tab-width: 1
    misspell:
      locale: US
      ignore-rules:
      - cancelled
      - marshalled
    modernize:
      disable:
      - omitzero
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    presets:
    - comments
    - common-false-positives
    - legacy
    - std-error-handling
    rules:
    - linters:
      - errcheck
      - maligned
      path: _test\.go$|^tests/|^samples/
    - linters:
      - revive
      - staticcheck
      text: "use underscores in Go names"
    - linters:
      - staticcheck
      path: ^crypto/
      text: "cipher.NewCFB"
    - linters:
      - staticcheck
      text: "SA6002"
    - linters:
      - staticcheck
      text: "snappy.NewWriter is deprecated"
    - linters:
      - revive
      text: "unused-parameter"
    - linters:
      - revive
      text: "avoid meaningless package names"
    - linters:
      - revive
      text: "Go standard library package names"
    - linters:
      - unparam
      text: "is always false"
    paths:
    - .*\.pb\.go
    - .*\.gen\.go
    - genfiles$
    - vendor$
    - bin$
    - third_party$
    - builtin$
    - examples$
    - node_modules

formatters:
  enable:
  - gci
  - gofumpt
  - goimports
  settings:
    gci:
      sections:
      - standard
      - default
      - prefix(github.com/fatedier/golib/)
  exclusions:
    generated: lax
    paths:
    - .*\.pb\.go
    - .*\.gen\.go
    - genfiles$
    - vendor$
    - bin$
    - third_party$
    - builtin$
    - examples$
    - node_modules
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
