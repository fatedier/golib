name: CI

on:
  push:
    branches:
    - master
    - dev
  pull_request:
    branches:
    - master
    - dev

jobs:

  test-go-latest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.25', '1.26' ]
    name: Go ${{ matrix.go }} Test
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go }}

    - name: Test
      run: go test -v --cover ./...
